function OnboardingScreen({ v, showCjm }) {
  const d = v.onboarding; const c = v.c;
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState({});
  const qs = [
    {q: d.q1, opts: d.q1_opts},
    {q: d.q2, opts: d.q2_opts},
    {q: d.q3, opts: d.q3_opts},
  ];
  const cur = qs[step];
  return (
    <div className="fade-in flex flex-col h-full">
      <div className="flex items-center gap-2 mb-4">
        {qs.map((_,i) => (
          <div key={i} className={`h-1.5 flex-1 rounded-full transition-all ${i<=step ? '' : 'bg-slate-200'}`}
               style={{background: i<=step ? c.bg : undefined}} />
        ))}
      </div>
      <div className="text-xs text-slate-400 mb-1">Вопрос {step+1} из {qs.length}</div>
      <p className="font-semibold text-slate-800 text-sm mb-3 leading-snug">{cur.q}</p>
      <div className="space-y-2 flex-1">
        {cur.opts.map((opt,i) => (
          <button key={i}
            onClick={() => { setAnswers({...answers, [step]:i}); if(step<qs.length-1) setStep(step+1); }}
            className={`w-full text-left text-sm px-3 py-2.5 rounded-lg border transition-all ${answers[step]===i ? 'border-2 font-medium' : 'border-slate-200 bg-white hover:border-slate-300'}`}
            style={answers[step]===i ? {borderColor:c.bg, background:c.light, color:c.text} : {}}>
            {opt}
          </button>
        ))}
      </div>
      <div className="mt-3 text-xs text-slate-400 italic">{d.style}</div>
      {showCjm && <CjmBadge stage="onboarding" />}
    </div>
  );
}

                </div>
              </div>

              {/* Screen selector */}
              <div className="bg-white rounded-xl p-3 border border-slate-200">
                <div className="text-xs font-semibold text-slate-500 mb-2 uppercase tracking-wide">Экран</div>
                <div className="space-y-1">
                  {SCREENS.map(s => {
                    const m = CJM_META[s];
                    return (
                      <button key={s}
                        onClick={() => setActiveScreen(s)}
                        className={`w-full text-left px-3 py-2 rounded-lg text-xs transition-all flex items-center gap-2 ${activeScreen===s ? 'font-semibold' : 'text-slate-500 hover:bg-slate-50'}`}
                        style={activeScreen===s ? {background:v.c.light, color:v.c.text} : {}}>
                        <span>{m.icon}</span>
                        <span>{SCREEN_LABELS[s]}</span>
                        <span className={`ml-auto text-xs px-1.5 py-0.5 rounded-full ${m.color}`}>{m.aarrr}</span>
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* Lock button */}
              <button onClick={() => lockVariant(activeVariant)}
                className="w-full py-2.5 rounded-xl text-sm font-bold text-white shadow-sm transition-all hover:opacity-90"
                style={{background:v.c.bg}}>
                ✅ Выбрать вариант {activeVariant}
              </button>
            </div>

            {/* CENTER: Phone mockup */}
            <div className="flex flex-col items-center">
              <div className="text-xs text-slate-400 mb-2 font-medium">{v.emoji} Вариант {activeVariant}: {v.name}</div>
              <div className="bg-slate-900 rounded-3xl p-3 shadow-2xl w-full max-w-[280px]">
                <div className="bg-white rounded-2xl overflow-hidden">
                  {/* Status bar */}
                  <div className="flex items-center justify-between px-4 py-2 bg-white border-b border-slate-50">
                    <span className="text-xs text-slate-400">9:41</span>
                    <div className="flex items-center gap-1">
                      <div className="w-4 h-1.5 bg-slate-300 rounded-sm" />
                      <div className="w-3 h-3 rounded-full border border-slate-300" />
                    </div>
                  </div>
                  {/* Screen content */}
                  <div className="p-3 min-h-[480px]">
                    <ScreenComp v={v} showCjm={showCjm} />
                  </div>
                </div>
              </div>
              <div className="mt-3 flex gap-1">
                {SCREENS.map(s => (
                  <button key={s}
                    onClick={() => setActiveScreen(s)}
                    className="w-2 h-2 rounded-full transition-all"
                    style={{background: activeScreen===s ? v.c.bg : '#e2e8f0'}} />
                ))}
              </div>
            </div>

            {/* RIGHT: Context panel */}
            <div className="space-y-3">
              {/* CJM stage info */}
              <div className="bg-white rounded-xl p-3 border border-slate-200">
                <div className={`inline-flex items-center gap-1.5 text-xs font-semibold px-2 py-1 rounded-full mb-2 ${CJM_META[activeScreen].color}`}>
                  {CJM_META[activeScreen].icon} {CJM_META[activeScreen].stage}
                </div>
                <div className="text-xs text-slate-600 leading-relaxed mb-2">{CJM_META[activeScreen].q}</div>
                <div className="text-xs text-slate-400">AARRR: <strong className="text-slate-600">{CJM_META[activeScreen].aarrr}</strong></div>
              </div>

              {/* Variant summary */}
              <div className="bg-white rounded-xl p-3 border border-slate-200">
                <div className="text-xs font-bold mb-2" style={{color:v.c.text}}>
                  {v.emoji} Вариант {activeVariant} — сводка
                </div>
                <div className="space-y-1.5 text-xs text-slate-600">
                  <div><span className="text-slate-400">Aha:</span> {v.aha.wow}</div>
                  <div><span className="text-slate-400">Paywall:</span> {v.pay.when}</div>
                  <div><span className="text-slate-400">Loop:</span> {v.dash.hook}</div>
                </div>
              </div>

              {/* RU Market specifics */}
              <div className="bg-amber-50 rounded-xl p-3 border border-amber-200">
                <div className="text-xs font-bold text-amber-800 mb-2">🇷🇺 РФ-специфика</div>
                <div className="space-y-1 text-xs text-amber-700">
                  <div>• Прогрев Яндекс + Mail.ru (основная боль)</div>
                  <div>• Оплата через ЮКасса / СБП / T-Pay</div>
                  <div>• 38-ФЗ: персонал. письма разрешены</div>
                  <div>• Поддержка на русском языке</div>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* COMPARE MODE */}
        {activeTab === "compare" && (
          <div className="bg-white rounded-2xl p-5 border border-slate-200">
            <div className="flex items-center justify-between mb-4">
              <h2 className="font-bold text-slate-800">⚖️ Сравнение вариантов</h2>
              <div className="text-xs text-slate-400">Instantly.ai аналог · Рынок РФ</div>
            </div>
            <CompareTable />
            <div className="mt-4 grid grid-cols-3 gap-3">
              {VAR_KEYS.map(k => (
                <button key={k}
                  onClick={() => lockVariant(k)}
                  className="py-2.5 rounded-xl text-sm font-bold text-white transition-all hover:opacity-90"
                  style={{background:VARIANTS[k].c.bg}}>
                  ✅ Выбрать {k}
                </button>
              ))}
            </div>
          </div>
        )}

        {/* BUILD MODE */}
        {activeTab === "build" && (
          <div className="bg-white rounded-2xl p-5 border border-slate-200">
            <Builder onLock={handleLock} />
          </div>
        )}

        {/* LOCKED RESULT */}
        {activeTab === "locked" && locked && (
          <div className="bg-white rounded-2xl p-5 border border-slate-200">
            <LockedResult locked={locked} />
          </div>
        )}
      </div>

      {/* FOOTER */}
      <div className="max-w-5xl mx-auto mt-6 text-center text-xs text-slate-400">
        Module 2.5 · reverse-engineering-unicorn · Поток (Instantly.ai RU) · CJM DEEP mode · 2026-04-29
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
