            {/* Header */}
            <div style={{ textAlign:"center", marginBottom:"1.5rem" }}>
              <h1 style={{ fontSize:"1.5rem", fontWeight:900, color:"#111827" }}>🌀 PulseOS · CJM Prototype</h1>

            {/* Mode tabs */}

              {[["variants","🎭 Варианты"],["compare","⚖️ Сравнение"],["builder","🔧 Конструктор"]].map(([m,l]) => (
                <Btn key={m} onClick={() => setMode(m)} className="flex-1 rounded-lg text-sm font-semibold py-2"

              <div className="fade-in">

                {/* Screen */}
                <div style={{ marginBottom:"1rem" }}>{renderScreen(activeVariant, activeScreen)}</div>

                {/* CJM toggle */}
                <Btn onClick={() => setShowCJM(!showCJM)} className="w-full rounded-xl py-2 text-sm font-semibold mb-3"

                      <div style={{ fontSize:"0.72rem", color:"#4338ca", fontWeight:600, marginBottom:"0.25rem" }}>🔬 Custdev‑вопрос:</div>

            {/* ═══ COMPARE ═══ */}
            {mode === "compare" && (
              <div className="fade-in" style={{ background:"white", borderRadius:"1rem", overflow:"hidden", boxShadow:"0 2px 8px rgba(0,0,0,0.1)" }}>
                <div style={{ background:"#111827", color:"white", padding:"1rem", textAlign:"center", fontWeight:700 }}>⚖️ Сравнение вариантов</div>
                <div style={{ overflowX:"auto" }}>
                  <table style={{ width:"100%", fontSize:"0.78rem", borderCollapse:"collapse" }}>
                    <thead>
                      <tr style={{ background:"#f9fafb" }}>
                        <th style={{ padding:"0.75rem", textAlign:"left", color:"#6b7280", fontWeight:500 }}>Параметр</th>
                        {Object.entries(VARIANTS).map(([k,vd]) => (
                          <th key={k} style={{ padding:"0.75rem", textAlign:"center" }}>
                            <span style={{ display:"inline-block", padding:"0.2rem 0.6rem", borderRadius:"0.5rem", background: vd.c.badgeBg, color: vd.c.badgeTxt, fontWeight:700 }}>
                              {vd.emoji} {k}

                            <div style={{ color:"#6b7280", fontWeight:400, marginTop:"0.2rem" }}>{vd.name}</div>
                          </th>

                      </tr>
                    </thead>
                    <tbody>
                      {[
                        ["Entry Hook",     k => VARIANTS[k].landing.hl.substring(0,52)+"…"],
                        ["Aha Moment",     k => VARIANTS[k].aha.title],
                        ["Aha — когда",    k => VARIANTS[k].aha.day],
                        ["Paywall",        k => VARIANTS[k].pay.when],
                        ["Referral hook",  k => VARIANTS[k].inv.hook],
                        ["Лучший сегмент", k => ({A:"Серьёзный атлет",B:"Longevity / biohacker",C:"Топ-профессионал"}[k])],

                        <tr key={label} style={{ background: i%2===0 ? "white" : "#f9fafb" }}>
                          <td style={{ padding:"0.65rem 0.75rem", fontWeight:500, color:"#374151" }}>{label}</td>
                          {Object.keys(VARIANTS).map(k => (
                            <td key={k} style={{ padding:"0.65rem 0.75rem", color:"#6b7280", textAlign:"center" }}>{fn(k)}</td>
                          ))}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                <div style={{ padding:"1rem", borderTop:"1px solid #e5e7eb" }}>
                  <p style={{ fontSize:"0.78rem", color:"#9ca3af", textAlign:"center", marginBottom:"0.75rem" }}>Выбери winning вариант:</p>
                  <div style={{ display:"flex", gap:"0.5rem" }}>
                    {Object.entries(VARIANTS).map(([k,vd]) => (
                      <Btn key={k} onClick={() => handleLock(k)}
                        style={{ flex:1, padding:"0.6rem", borderRadius:"0.75rem", color:"white", background: vd.c.bg, fontWeight:700, fontSize:"0.82rem" }}>
                        ✅ {k}
                      </Btn>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* ═══ BUILDER ═══ */}
            {mode === "builder" && (
              <div className="fade-in" style={{ display:"flex", flexDirection:"column", gap:"1rem" }}>
                <div style={{ background:"white", borderRadius:"1rem", padding:"1rem", boxShadow:"0 2px 6px rgba(0,0,0,0.08)" }}>
                  <div style={{ fontWeight:700, color:"#111827", marginBottom:"1rem" }}>🔧 Конструктор: выбери лучший экран из каждого варианта</div>
                  {SCREENS.map(screen => (
                    <div key={screen} style={{ marginBottom:"1rem" }}>
                      <div style={{ fontSize:"0.82rem", fontWeight:600, color:"#6b7280", marginBottom:"0.4rem" }}>{SCREEN_LABELS[screen]}</div>
                      <div style={{ display:"flex", gap:"0.4rem" }}>
                        {Object.entries(VARIANTS).map(([k,vd]) => (
                          <Btn key={k} onClick={() => updateMix(screen, k)}
                            style={{ flex:1, padding:"0.5rem", borderRadius:"0.65rem", fontSize:"0.82rem", fontWeight:600,
                              background: mix[screen]===k ? vd.c.bg : "white",
                              color: mix[screen]===k ? "white" : vd.c.text,
                              border: mix[screen]===k ? "none" : `1.5px solid ${vd.c.border}` }}>
                            {vd.emoji} {k}
                          </Btn>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>

                {/* Preview */}
                <div style={{ background:"white", borderRadius:"1rem", padding:"1rem", boxShadow:"0 2px 6px rgba(0,0,0,0.08)" }}>
                  <div style={{ fontWeight:700, color:"#111827", marginBottom:"0.75rem" }}>👁 Preview: кастомный CJM</div>
                  <div style={{ display:"flex", gap:"0.3rem", overflowX:"auto", paddingBottom:"0.25rem", marginBottom:"0.75rem" }}>
                    {SCREENS.map(s => (
                      <Btn key={s} onClick={() => setActiveScreen(s)}
                        style={{ whiteSpace:"nowrap", padding:"0.3rem 0.6rem", borderRadius:"0.5rem", fontSize:"0.72rem", fontWeight:500,
                          background: activeScreen===s ? "#111827" : "#f3f4f6", color: activeScreen===s ? "white" : "#6b7280" }}>
                        {SCREEN_LABELS[s]} <span style={{ color: VARIANTS[mix[s]].c.text, fontWeight:700 }}>({mix[s]})</span>
                      </Btn>
                    ))}
                  </div>
                  {renderScreen(mix[activeScreen], activeScreen)}
                </div>

                <Btn onClick={() => handleLock("custom")} className="w-full rounded-xl py-3 font-bold"
                  style={{ width:"100%", background:"#111827", color:"white", fontSize:"0.95rem" }}>
                  ✅ Зафиксировать кастомный CJM
                </Btn>
              </div>
            )}

            {/* ═══ LOCKED ═══ */}
            {mode === "locked" && locked && (
              <div className="fade-in" style={{ background:"white", borderRadius:"1rem", overflow:"hidden", boxShadow:"0 4px 16px rgba(0,0,0,0.12)" }}>
                <div style={{ background:"#111827", color:"white", padding:"1.5rem", textAlign:"center" }}>
                  <div style={{ fontSize:"2.5rem", marginBottom:"0.5rem" }}>✅</div>
                  <h2 style={{ fontSize:"1.15rem", fontWeight:700 }}>
                    Winning CJM: {locked === "custom" ? "🔧 Кастомный микс" : `${VARIANTS[locked].emoji} Вариант ${locked} — «${VARIANTS[locked]?.name}»`}

                </div>
                <div style={{ padding:"1.25rem", display:"flex", flexDirection:"column", gap:"0.75rem" }}>
                  {locked !== "custom" && (<>
                    <div style={{ background:"#f0fdf4", borderRadius:"0.75rem", padding:"1rem", border:"1.5px solid #86efac" }}>
                      <div style={{ fontWeight:600, color:"#15803d", marginBottom:"0.5rem" }}>🎯 Выбранная стратегия</div>
                      <div style={{ fontSize:"0.85rem", color:"#374151", lineHeight:1.6 }}>
                        <div><b>Aha Moment:</b> {VARIANTS[locked].aha.title} ({VARIANTS[locked].aha.day})</div>
                        <div><b>Paywall:</b> {VARIANTS[locked].pay.when}</div>
                        <div><b>Referral:</b> {VARIANTS[locked].inv.hook}</div>
                      </div>
                    </div>
                    <div style={{ background:"#eff6ff", borderRadius:"0.75rem", padding:"1rem", border:"1.5px solid #93c5fd", fontSize:"0.82rem" }}>
                      <div style={{ fontWeight:600, color:"#1d4ed8", marginBottom:"0.5rem" }}>📦 Передаётся в Phase 1 (SPARC Planning)</div>
                      <div style={{ color:"#374151", lineHeight:1.7 }}>
                        <div>→ <b>M3:</b> Aha «{VARIANTS[locked].aha.title}» → competitive comparison</div>
                        <div>→ <b>M4:</b> Paywall {VARIANTS[locked].pay.when} → revenue model</div>
                        <div>→ <b>M5:</b> Loop «{locked==="A"?"Community/Sport":locked==="B"?"Data/Longevity":"B2B/Enterprise"}» → growth engine</div>
                        <div>→ <b>MVP scope:</b> 6 экранов winning CJM = PRD scope</div>
                      </div>
                    </div>
                  </>)}
                  {locked === "custom" && (
                    <div style={{ background:"#faf5ff", borderRadius:"0.75rem", padding:"1rem", border:"1.5px solid #c4b5fd", fontSize:"0.82rem" }}>
                      <div style={{ fontWeight:600, color:"#7c3aed", marginBottom:"0.5rem" }}>🔧 Кастомный микс зафиксирован</div>
                      {SCREENS.map(s => (
                        <div key={s} style={{ color:"#374151", marginBottom:"0.2rem" }}>
                          {SCREEN_LABELS[s]}: <b style={{ color: VARIANTS[mix[s]].c.text }}>Вариант {mix[s]} ({VARIANTS[mix[s]].name})</b>
                        </div>
                      ))}
                    </div>
                  )}
                  <Btn onClick={() => { setMode("variants"); setLocked(null); }}
                    style={{ width:"100%", padding:"0.65rem", borderRadius:"0.75rem", border:"2px solid #d1d5db",
                      background:"white", color:"#374151", fontWeight:600, fontSize:"0.85rem" }}>
                    ← Вернуться к вариантам
                  </Btn>
                </div>
              </div>
            )}

            {/* Footer */}
            <div style={{ marginTop:"1.5rem", textAlign:"center", fontSize:"0.72rem", color:"#9ca3af", lineHeight:1.8 }}>
              <div>PulseOS · WHOOP Analogue CJM Prototype · DEEP Mode · 2026-04-15</div>
              <div>Generated by reverse-engineering-unicorn v2 · Module 2.5</div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
